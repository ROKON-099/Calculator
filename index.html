<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="lg:bg-black bg-gray-800">

    <section class="flex flex-col md:flex-row w-full min-h-100vh bg-gray-900">

<!-- Left Side -->
        <div class="w-full md:w-1/2 flex flex-col items-center justify-center p-6 text-center">
    
       <h1 class="text-4xl md:text-6xl lg:ml-12 text-orange-600 font-bold italic">
        CALCULATOR
       </h1>

       <p class="text-2xl md:text-4xl mt-4 lg:ml-12 text-white font-bold italic">
        Javascript Project
       </p>

        </div>


           <!-- Right Side -->
         <div class="w-full md:w-1/2 flex items-center justify-center p-6">

          <div class="w-full max-w-sm">

             <input type="text" id="display"
          class="bg-gray-800 text-white text-right p-4 w-full mb-4 rounded outline-none"
         value="0" readonly>

             <div class="grid grid-cols-4 gap-3">

             <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('7')">7</button>
            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('8')">8</button>
            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('9')">9</button>
            <button class="bg-orange-600 text-white p-4 rounded" onclick="appendToDisplay('/')">/</button>

            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('4')">4</button>
            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('5')">5</button>
            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('6')">6</button>
            <button class="bg-orange-600 text-white p-4 rounded" onclick="appendToDisplay('*')">*</button>

            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('1')">1</button>
            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('2')">2</button>
            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('3')">3</button>
            <button class="bg-orange-600 text-white p-4 rounded" onclick="appendToDisplay('-')">-</button>

            <button class="bg-gray-700 text-white p-4 rounded col-span-2" onclick="appendToDisplay('0')">0</button>
            <button class="bg-gray-700 text-white p-4 rounded" onclick="appendToDisplay('.')">.</button>
            <button class="bg-orange-600 text-white p-4 rounded" onclick="appendToDisplay('+')">+</button>

            <button class="bg-red-600 text-white p-4 rounded " onclick="clearDisplay()">Clear</button>
             <button class="bg-yellow-600 text-white p-4 rounded " onclick="deleteLast()">DEL</button>
            <button class="bg-green-600 text-white p-4 rounded col-span-2" onclick="calculateResult()">=</button>
            
        </div>

             </div>
            </div>

           </section>
        <footer class="w-full lg:bg-black   text-white px-2 py-2">
  <div class="max-w-7xl mx-auto flex flex-col sm:flex-row  justify-center items-center text-center gap-2">
    
    <p class="text-sm sm:text-base md:text-lg mt-4  font-semibold">
      Copyright © <span id="year"></span>
      <span class="block sm:inline"> - All rights reserved by ROKON.IO</span>
    </p>

  </div>
</footer>


 <script src="index.js"></script>
                
    
</body>
</html>
